<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DynoFluid — Fluid Sandbox</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #070b14;
      overflow: hidden;
      font-family: 'Inter', system-ui, sans-serif;
      color: #e0eaff;
    }

    #canvas {
      display: block;
      width: 100vw;
      height: 100vh;
    }

    /* ── No WebGPU fallback ─────────────────────────────────────────── */
    #no-webgpu {
      display: none;
      position: fixed;
      inset: 0;
      align-items: center;
      justify-content: center;
      background: #070b14;
      z-index: 100;
      flex-direction: column;
      gap: 1rem;
      text-align: center;
      padding: 2rem;
    }
    #no-webgpu h2 { font-size: 1.5rem; color: #f87171; }
    #no-webgpu p  { color: #94a3b8; max-width: 480px; line-height: 1.6; }

    /* ── Sandbox panel ──────────────────────────────────────────────── */
    #sandbox-panel {
      position: fixed;
      top: 1.2rem;
      right: 1.2rem;
      width: 260px;
      background: rgba(10, 15, 30, 0.88);
      border: 1px solid rgba(99, 172, 255, 0.18);
      border-radius: 14px;
      padding: 1rem 1.1rem 1.1rem;
      backdrop-filter: blur(16px);
      z-index: 20;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .sp-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0.2rem;
    }
    .sp-title { font-size: 0.95rem; font-weight: 600; color: #c8daff; }
    .sp-badge {
      font-size: 0.6rem;
      font-family: 'JetBrains Mono', monospace;
      background: rgba(56, 140, 255, 0.15);
      color: #6cb4ff;
      border: 1px solid rgba(56, 140, 255, 0.25);
      border-radius: 4px;
      padding: 2px 6px;
      letter-spacing: 0.06em;
    }

    .sp-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      cursor: default;
    }
    .sp-label {
      font-size: 0.72rem;
      color: #94a3b8;
      min-width: 72px;
      flex-shrink: 0;
    }
    .sp-row input[type=range] {
      flex: 1;
      accent-color: #3b8fff;
      cursor: pointer;
    }
    .sp-val {
      font-size: 0.68rem;
      font-family: 'JetBrains Mono', monospace;
      color: #6cb4ff;
      min-width: 52px;
      text-align: right;
    }

    .sp-spawns { display: flex; flex-direction: column; gap: 0.4rem; }
    .sp-spawn-btns { display: flex; gap: 0.4rem; }
    .sp-spawn {
      flex: 1;
      padding: 4px 6px;
      font-size: 0.68rem;
      border-radius: 6px;
      border: 1px solid rgba(99, 172, 255, 0.2);
      background: transparent;
      color: #94a3b8;
      cursor: pointer;
      transition: all 0.15s;
    }
    .sp-spawn:hover   { border-color: rgba(99,172,255,0.5); color: #c8daff; }
    .sp-spawn.active  { background: rgba(56,140,255,0.18); border-color: #3b8fff; color: #a8d0ff; }

    #sp-reset {
      width: 100%;
      padding: 7px;
      border-radius: 8px;
      border: 1px solid rgba(99,172,255,0.25);
      background: rgba(56,140,255,0.12);
      color: #88bbff;
      font-size: 0.78rem;
      cursor: pointer;
      transition: all 0.15s;
    }
    #sp-reset:hover { background: rgba(56,140,255,0.22); border-color: rgba(99,172,255,0.4); }

    /* ── Corner label ───────────────────────────────────────────────── */
    #corner-label {
      position: fixed;
      bottom: 1rem;
      left: 1.2rem;
      font-size: 0.65rem;
      color: rgba(148,163,184,0.4);
      pointer-events: none;
      font-family: 'JetBrains Mono', monospace;
      letter-spacing: 0.04em;
    }
  </style>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@400;700&display=swap"
    rel="stylesheet"
  />
</head>
<body>

  <canvas id="canvas"></canvas>

  <div id="no-webgpu">
    <h2>WebGPU Required</h2>
    <p>DynoFluid uses WebGPU for real-time fluid simulation.<br>
       Use Chrome 113+, Edge 113+, or Safari 18+ (macOS Sonoma).</p>
  </div>

  <div id="corner-label">DynoFluid · MLS-MPM · WebGPU</div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
